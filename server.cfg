# FiveM Server Configuration
# See https://docs.fivem.net/docs/server-manual/setting-up-a-server/ for full documentation

# ─── Server Identity ──────────────────────────────────────────────────────────
sv_hostname "Mingo FiveM Server"          # Name shown in the server browser
sv_projectName "fivemservermingo"
sv_projectDesc "A FiveM roleplay / game server"

# Banner image URL (optional)
# load_server_icon myicon.png

# ─── Access ───────────────────────────────────────────────────────────────────
# Uncomment the line below and replace with your license key from
# https://keymaster.fivem.net
# sv_licenseKey "YOUR_LICENSE_KEY_HERE"

# Allow / deny joining without a FiveM account (false = account required)
sv_authMaxVariance 1
sv_authMinTrust 5

# ─── Networking ───────────────────────────────────────────────────────────────
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# Maximum number of clients
sv_maxclients 32

# ─── OneSync ──────────────────────────────────────────────────────────────────
# Enable OneSync for extended player slots and state awareness
# Options: off | legacy | on
set onesync on

# ─── RCON (optional) ──────────────────────────────────────────────────────────
# rcon_password "CHANGE_THIS_PASSWORD"

# ─── Resources ────────────────────────────────────────────────────────────────
# Built-in cfx-default resources
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure rconlog

# Custom resources
ensure car-spawner
ensure weapon-loadout

# ─── Steam Web API (optional) ─────────────────────────────────────────────────
# Obtain a key at https://steamcommunity.com/dev/apikey
# steam_webApiKey "YOUR_STEAM_API_KEY"

# ─── Voice chat (optional) ────────────────────────────────────────────────────
# set voice_useSendingRangeOnly true
# set voice_defaultCycle GRAVE

# ─── Logging ──────────────────────────────────────────────────────────────────
# sv_logFile "server.log"
